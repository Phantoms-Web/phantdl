<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantdl — Universal Downloader</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#03090f;color:#d0eeff;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
h1{font-size:2rem;color:#00b4ff;margin-bottom:8px;letter-spacing:2px;text-align:center}
.sub{color:rgba(160,210,240,0.5);margin-bottom:30px;font-size:13px;text-align:center}
.box{width:100%;max-width:620px;background:rgba(0,180,255,0.03);border:1px solid rgba(0,180,255,0.15);border-radius:14px;padding:24px}
input{width:100%;padding:14px 16px;background:rgba(0,180,255,0.05);border:1px solid rgba(0,180,255,0.2);border-radius:10px;color:#d0eeff;font-size:15px;outline:none;margin-bottom:12px}
input::placeholder{color:rgba(160,210,240,0.3)}
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,#00b4ff,#0070ff);border:none;border-radius:10px;color:white;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px}
.btn-main:disabled{opacity:0.5;cursor:not-allowed}
.result{margin-top:20px;display:none}
.thumb{width:100%;border-radius:10px;margin-bottom:12px;max-height:220px;object-fit:cover}
.title{font-size:14px;font-weight:600;margin-bottom:12px;color:#00f0ff;line-height:1.5}
.formats{display:flex;flex-direction:column;gap:8px}
.dl-btn{display:block;padding:13px 16px;background:rgba(0,180,255,0.06);border:1px solid rgba(0,180,255,0.2);border-radius:8px;color:#d0eeff;text-decoration:none;font-size:13px;text-align:center;cursor:pointer}
.dl-btn:hover{background:rgba(0,180,255,0.15)}
.error{color:#ff4466;margin-top:12px;font-size:13px;display:none;padding:12px;background:rgba(255,68,102,0.08);border:1px solid rgba(255,68,102,0.2);border-radius:8px}
.loading{text-align:center;margin-top:12px;color:#00b4ff;display:none}
.platform-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:12px}
.pt-yt{background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.3);color:#ff4444}
.pt-tk{background:rgba(0,242,234,0.1);border:1px solid rgba(0,242,234,0.3);color:#00f2ea}
.pt-ig{background:rgba(225,48,108,0.1);border:1px solid rgba(225,48,108,0.3);color:#e1306c}
.pt-fb{background:rgba(24,119,242,0.1);border:1px solid rgba(24,119,242,0.3);color:#1877f2}
.pt-tw{background:rgba(29,161,242,0.1);border:1px solid rgba(29,161,242,0.3);color:#1da1f2}
.pt-tb{background:rgba(0,180,255,0.1);border:1px solid rgba(0,180,255,0.3);color:#00b4ff}
footer{margin-top:30px;color:rgba(160,210,240,0.2);font-size:11px;text-align:center;letter-spacing:1px}
.supported{margin-top:20px;text-align:center;color:rgba(160,210,240,0.3);font-size:11px}
</style>
</head>
<body>
<h1>PHANTDL</h1>
<p class="sub">Universal Downloader — No Watermark — Max Quality</p>

<div class="box">
  <input type="text" id="urlInput" placeholder="Paste link... TikTok, Instagram, YouTube, Facebook, Twitter...">
  <button class="btn-main" id="btn" onclick="fetchInfo()">⬇ FETCH & DOWNLOAD</button>
  <div class="loading" id="loading">⏳ Processing...</div>
  <div class="error" id="error"></div>
  <div class="result" id="result">
    <div id="ptag"></div>
    <img class="thumb" id="thumb" src="" alt="" onerror="this.style.display='none'">
    <div class="title" id="ttitle"></div>
    <div class="formats" id="formats"></div>
  </div>
</div>

<div class="supported">
  Supports: TikTok · Instagram · Facebook · YouTube · Twitter · Pinterest · and 100+ more
</div>

<footer>PHANTDL v3.0 · PHANTOMS WEB</footer>

<script>
function show(id){document.getElementById(id).style.display='block'}
function hide(id){document.getElementById(id).style.display='none'}
function setError(msg){document.getElementById('error').textContent='❌ '+msg;show('error')}

function detectPlatform(url){
  if(url.includes('tiktok.com')) return {name:'TIKTOK',cls:'pt-tk'};
  if(url.includes('instagram.com')) return {name:'INSTAGRAM',cls:'pt-ig'};
  if(url.includes('youtube.com')||url.includes('youtu.be')) return {name:'YOUTUBE',cls:'pt-yt'};
  if(url.includes('facebook.com')||url.includes('fb.watch')) return {name:'FACEBOOK',cls:'pt-fb'};
  if(url.includes('twitter.com')||url.includes('x.com')) return {name:'TWITTER/X',cls:'pt-tw'};
  if(url.includes('terabox.com')||url.includes('teraboxapp.com')) return {name:'TERABOX',cls:'pt-tb'};
  return {name:'UNIVERSAL',cls:'pt-tb'};
}

function addDownloadBtn(label, href, download){
  const a = document.createElement('a');
  a.className = 'dl-btn';
  a.textContent = '⬇ ' + label;
  a.href = href;
  a.target = '_blank';
  if(download) a.download = download;
  document.getElementById('formats').appendChild(a);
}

async function fetchInfo(){
  const url = document.getElementById('urlInput').value.trim();
  if(!url) return alert('Please paste a link!');

  document.getElementById('btn').disabled = true;
  show('loading');
  hide('error');
  hide('result');
  document.getElementById('formats').innerHTML = '';

  const p = detectPlatform(url);
  document.getElementById('ptag').innerHTML = `<span class="platform-tag ${p.cls}">${p.name}</span>`;

  try {
    // TikTok — tikwm API (watermark free)
    if(url.includes('tiktok.com')){
      await fetchTikTok(url);
    }
    // Instagram
    else if(url.includes('instagram.com')){
      await fetchInstagram(url);
    }
    // Facebook
    else if(url.includes('facebook.com')||url.includes('fb.watch')){
      await fetchFacebook(url);
    }
    // Twitter/X
    else if(url.includes('twitter.com')||url.includes('x.com')){
      await fetchTwitter(url);
    }
    // YouTube
    else if(url.includes('youtube.com')||url.includes('youtu.be')){
      await fetchYouTube(url);
    }
    // Terabox
    else if(url.includes('terabox.com')||url.includes('teraboxapp.com')){
      await fetchTerabox(url);
    }
    // Universal fallback
    else {
      await fetchUniversal(url);
    }
  } catch(e){
    setError('Failed: ' + e.message);
  }

  hide('loading');
  document.getElementById('btn').disabled = false;
}

// ═══ TIKTOK (tikwm.com - watermark free) ═══
async function fetchTikTok(url){
  const res = await fetch('https://www.tikwm.com/api/', {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: 'url='+encodeURIComponent(url)+'&hd=1'
  });
  const data = await res.json();
  if(data.code === 0 && data.data){
    const d = data.data;
    document.getElementById('thumb').src = d.cover || '';
    document.getElementById('ttitle').textContent = d.title || 'TikTok Video';
    
    if(d.hdplay) addDownloadBtn('Download HD (No Watermark)', d.hdplay, 'tiktok_hd.mp4');
    if(d.play) addDownloadBtn('Download SD (No Watermark)', d.play, 'tiktok_sd.mp4');
    if(d.wmplay) addDownloadBtn('Download With Watermark', d.wmplay, 'tiktok_wm.mp4');
    
    // Photos
    if(d.images && d.images.length > 0){
      d.images.forEach((img, i) => {
        addDownloadBtn(`Download Photo ${i+1}`, img, `tiktok_photo_${i+1}.jpg`);
      });
    }
    show('result');
  } else {
    setError('TikTok fetch failed. Try another link.');
  }
}

// ═══ INSTAGRAM ═══
async function fetchInstagram(url){
  const api = `https://api.tiklydown.eu.org/api/download/v3?url=${encodeURIComponent(url)}`;
  const res = await fetch(api);
  const data = await res.json();
  
  if(data.medias && data.medias.length > 0){
    document.getElementById('thumb').src = data.thumbnail || '';
    document.getElementById('ttitle').textContent = data.title || 'Instagram Media';
    
    data.medias.forEach((m, i) => {
      const label = m.type === 'video' 
        ? `Download Video ${i+1} (${m.quality || 'HD'})` 
        : `Download Photo ${i+1}`;
      addDownloadBtn(label, m.url, `instagram_${i+1}.${m.extension || 'mp4'}`);
    });
    show('result');
  } else {
    setError('Instagram fetch failed. Make sure the post is public.');
  }
}

// ═══ FACEBOOK ═══
async function fetchFacebook(url){
  const api = `https://api.tiklydown.eu.org/api/download/v3?url=${encodeURIComponent(url)}`;
  const res = await fetch(api);
  const data = await res.json();
  
  if(data.medias && data.medias.length > 0){
    document.getElementById('thumb').src = data.thumbnail || '';
    document.getElementById('ttitle').textContent = data.title || 'Facebook Video';
    data.medias.forEach((m, i) => {
      addDownloadBtn(`Download ${m.quality || 'HD'} (${m.extension || 'mp4'})`, m.url, `facebook_${i+1}.mp4`);
    });
    show('result');
  } else {
    setError('Facebook fetch failed. Make sure the video is public.');
  }
}

// ═══ TWITTER/X ═══
async function fetchTwitter(url){
  const api = `https://api.tiklydown.eu.org/api/download/v3?url=${encodeURIComponent(url)}`;
  const res = await fetch(api);
  const data = await res.json();
  
  if(data.medias && data.medias.length > 0){
    document.getElementById('thumb').src = data.thumbnail || '';
    document.getElementById('ttitle').textContent = data.title || 'Twitter/X Media';
    data.medias.forEach((m, i) => {
      addDownloadBtn(`Download ${m.quality || 'HD'}`, m.url, `twitter_${i+1}.mp4`);
    });
    show('result');
  } else {
    setError('Twitter fetch failed.');
  }
}

// ═══ YOUTUBE ═══
async function fetchYouTube(url){
  const api = `https://api.tiklydown.eu.org/api/download/v3?url=${encodeURIComponent(url)}`;
  const res = await fetch(api);
  const data = await res.json();
  
  if(data.medias && data.medias.length > 0){
    document.getElementById('thumb').src = data.thumbnail || '';
    document.getElementById('ttitle').textContent = data.title || 'YouTube Video';
    data.medias.forEach((m, i) => {
      addDownloadBtn(`Download ${m.quality || 'HD'} (${m.extension || 'mp4'})`, m.url, `youtube_${i+1}.mp4`);
    });
    show('result');
  } else {
    setError('YouTube fetch failed. Try a short/public video.');
  }
}

// ═══ TERABOX ═══
async function fetchTerabox(url){
  const api = `https://teraboxapp.com/api/shorturlinfo?shorturl=${encodeURIComponent(url)}`;
  try {
    const res = await fetch(`https://api.tiklydown.eu.org/api/download/v3?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    if(data.medias && data.medias.length > 0){
      document.getElementById('ttitle').textContent = data.title || 'Terabox File';
      data.medias.forEach((m,i) => {
        addDownloadBtn(`Download File ${i+1}`, m.url, `terabox_${i+1}`);
      });
      show('result');
    } else {
      setError('Terabox fetch failed.');
    }
  } catch(e){
    setError('Terabox fetch failed: ' + e.message);
  }
}

// ═══ UNIVERSAL FALLBACK ═══
async function fetchUniversal(url){
  const api = `https://api.tiklydown.eu.org/api/download/v3?url=${encodeURIComponent(url)}`;
  const res = await fetch(api);
  const data = await res.json();
  
  if(data.medias && data.medias.length > 0){
    document.getElementById('thumb').src = data.thumbnail || '';
    document.getElementById('ttitle').textContent = data.title || 'Media';
    data.medias.forEach((m,i) => {
      addDownloadBtn(`Download ${m.quality || 'HD'}`, m.url, `phantdl_${i+1}.${m.extension||'mp4'}`);
    });
    show('result');
  } else {
    setError('Could not fetch this link. Try another platform.');
  }
}

document.getElementById('urlInput').addEventListener('keypress', e => {
  if(e.key === 'Enter') fetchInfo();
});
</script>
</body>
</html>
