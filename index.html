<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantdl — Universal Downloader</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#03090f;color:#d0eeff;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
h1{font-size:2rem;color:#00b4ff;margin-bottom:8px;letter-spacing:2px;text-align:center}
.sub{color:rgba(160,210,240,0.5);margin-bottom:30px;font-size:13px;text-align:center}
.box{width:100%;max-width:620px;background:rgba(0,180,255,0.03);border:1px solid rgba(0,180,255,0.15);border-radius:14px;padding:24px}
input{width:100%;padding:14px 16px;background:rgba(0,180,255,0.05);border:1px solid rgba(0,180,255,0.2);border-radius:10px;color:#d0eeff;font-size:15px;outline:none;margin-bottom:12px}
input::placeholder{color:rgba(160,210,240,0.3)}
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,#00b4ff,#0070ff);border:none;border-radius:10px;color:white;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px}
.btn-main:disabled{opacity:0.5;cursor:not-allowed}
.platform-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:14px}
.pt-yt{background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.3);color:#ff4444}
.pt-tiktok{background:rgba(0,242,234,0.1);border:1px solid rgba(0,242,234,0.3);color:#00f2ea}
.pt-ig{background:rgba(225,48,108,0.1);border:1px solid rgba(225,48,108,0.3);color:#e1306c}
.pt-fb{background:rgba(24,119,242,0.1);border:1px solid rgba(24,119,242,0.3);color:#1877f2}
.pt-tb{background:rgba(0,180,255,0.1);border:1px solid rgba(0,180,255,0.3);color:#00b4ff}
.pt-other{background:rgba(160,210,240,0.1);border:1px solid rgba(160,210,240,0.2);color:#d0eeff}
.thumb-wrap{position:relative;margin-bottom:14px}
.thumb{width:100%;border-radius:10px;max-height:220px;object-fit:cover}
.title{font-size:14px;font-weight:600;margin-bottom:14px;color:#00f0ff;line-height:1.5}
.formats{display:flex;flex-direction:column;gap:8px}
.fmt-btn{padding:13px 16px;background:rgba(0,180,255,0.06);border:1px solid rgba(0,180,255,0.2);border-radius:8px;color:#d0eeff;text-align:left;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;width:100%}
.fmt-btn:hover{background:rgba(0,180,255,0.15);border-color:rgba(0,180,255,0.4)}
.fmt-badge{background:rgba(0,180,255,0.15);border:1px solid rgba(0,180,255,0.3);color:#00b4ff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.terabox-file{padding:13px 16px;background:rgba(0,180,255,0.06);border:1px solid rgba(0,180,255,0.2);border-radius:8px;margin-bottom:8px}
.tf-name{font-size:13px;color:#00f0ff;margin-bottom:6px}
.tf-size{font-size:11px;color:rgba(160,210,240,0.5);margin-bottom:8px}
.tf-btn{padding:8px 16px;background:linear-gradient(135deg,#00b4ff,#0070ff);border:none;border-radius:6px;color:white;font-size:12px;font-weight:700;cursor:pointer;width:100%}
.result{margin-top:20px;display:none}
.error{color:#ff4466;margin-top:12px;font-size:13px;display:none;padding:12px;background:rgba(255,68,102,0.08);border:1px solid rgba(255,68,102,0.2);border-radius:8px}
.loading{text-align:center;margin-top:12px;color:#00b4ff;display:none;font-size:14px}
.progress{margin-top:12px;display:none}
.progress-bar{height:4px;background:rgba(0,180,255,0.1);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#00b4ff,#00f0ff);width:0%;transition:width 0.3s;border-radius:4px}
.progress-text{font-size:12px;color:rgba(160,210,240,0.6);margin-top:6px;text-align:center}
footer{margin-top:30px;color:rgba(160,210,240,0.2);font-size:11px;text-align:center;letter-spacing:1px}
</style>
</head>
<body>
<h1>⚡ PHANTDL</h1>
<p class="sub">Universal Downloader — No Watermark — Max Quality</p>

<div class="box">
  <input type="text" id="urlInput" placeholder="Paste any link... TikTok, Instagram, YouTube, Facebook, Terabox...">
  <button class="btn-main" id="btn" onclick="fetchInfo()">⬇ FETCH & DOWNLOAD</button>
  <div class="loading" id="loading">⏳ Fetching info...</div>
  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div id="platformTag"></div>
    <img class="thumb" id="thumb" src="" alt="" onerror="this.style.display='none'">
    <div class="title" id="titleText"></div>
    <div class="formats" id="formats"></div>
  </div>
</div>

<footer>PHANTDL v2.0 · PHANTOMS WEB</footer>

<script>
const BACKEND = "https://phantoms-web-phantdl-backend.hf.space";

function detectPlatform(url) {
  if (url.includes('youtube.com') || url.includes('youtu.be')) return {name:'YOUTUBE', cls:'pt-yt'};
  if (url.includes('tiktok.com')) return {name:'TIKTOK', cls:'pt-tiktok'};
  if (url.includes('instagram.com')) return {name:'INSTAGRAM', cls:'pt-ig'};
  if (url.includes('facebook.com') || url.includes('fb.watch')) return {name:'FACEBOOK', cls:'pt-fb'};
  if (url.includes('terabox.com') || url.includes('teraboxapp.com') || url.includes('1024tera.com')) return {name:'TERABOX', cls:'pt-tb'};
  return {name:'UNIVERSAL', cls:'pt-other'};
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes > 1024*1024*1024) return (bytes/1024/1024/1024).toFixed(1) + ' GB';
  if (bytes > 1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  if (bytes > 1024) return (bytes/1024).toFixed(1) + ' KB';
  return bytes + ' B';
}

async function fetchInfo() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return alert('Please paste a link!');

  document.getElementById('btn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error').style.display = 'none';
  document.getElementById('result').style.display = 'none';

  try {
    const res = await fetch(BACKEND + '/get-info', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();

    if (data.success) {
      // Platform tag
      const p = detectPlatform(url);
      document.getElementById('platformTag').innerHTML = `<span class="platform-tag ${p.cls}">${p.name}</span>`;
      
      // Thumbnail
      const thumb = document.getElementById('thumb');
      if (data.thumbnail) {
        thumb.src = data.thumbnail;
        thumb.style.display = 'block';
      } else {
        thumb.style.display = 'none';
      }
      
      // Title
      document.getElementById('titleText').textContent = data.title || '';
      
      const fmts = document.getElementById('formats');
      fmts.innerHTML = '';

      // Terabox files
      if (data.is_terabox && data.files) {
        data.files.forEach(f => {
          const div = document.createElement('div');
          div.className = 'terabox-file';
          div.innerHTML = `
            <div class="tf-name">📁 ${f.name}</div>
            <div class="tf-size">${formatSize(f.size)}</div>
            <button class="tf-btn" onclick="downloadFile('${url}', '${f.name}')">⬇ DOWNLOAD</button>
          `;
          fmts.appendChild(div);
        });
      } else {
        // Normal formats
        if (data.formats && data.formats.length > 0) {
          data.formats.forEach(f => {
            const btn = document.createElement('button');
            btn.className = 'fmt-btn';
            const size = f.filesize ? formatSize(f.filesize) : '';
            btn.innerHTML = `
              <span>⬇ ${f.quality || 'HD'} · ${f.ext.toUpperCase()}${size ? ' · '+size : ''}</span>
              <span class="fmt-badge">${f.quality || 'HD'}</span>
            `;
            btn.onclick = () => downloadVideo(url, f.format_id, f.quality);
            fmts.appendChild(btn);
          });
        } else {
          // Fallback best quality
          const btn = document.createElement('button');
          btn.className = 'fmt-btn';
          btn.innerHTML = '<span>⬇ Download Best Quality</span><span class="fmt-badge">BEST</span>';
          btn.onclick = () => downloadVideo(url, 'best', 'Best');
          fmts.appendChild(btn);
        }
      }

      document.getElementById('result').style.display = 'block';
    } else {
      document.getElementById('error').textContent = '❌ ' + (data.error || 'Failed to fetch info');
      document.getElementById('error').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('error').textContent = '❌ Backend connection failed! Please try again.';
    document.getElementById('error').style.display = 'block';
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('btn').disabled = false;
}

function downloadVideo(url, formatId, quality) {
  const a = document.createElement('a');
  a.href = BACKEND + '/download';
  
  fetch(BACKEND + '/download', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url, format_id: formatId})
  }).then(res => {
    if (!res.ok) throw new Error('Download failed');
    return res.blob();
  }).then(blob => {
    const url2 = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url2;
    a.download = 'phantdl_' + quality + '.mp4';
    a.click();
    URL.revokeObjectURL(url2);
  }).catch(e => {
    document.getElementById('error').textContent = '❌ Download failed: ' + e.message;
    document.getElementById('error').style.display = 'block';
  });
}

function downloadFile(url, filename) {
  fetch(BACKEND + '/download', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url, format_id: 'best'})
  }).then(res => res.blob())
  .then(blob => {
    const url2 = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url2;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url2);
  }).catch(e => {
    document.getElementById('error').textContent = '❌ Download failed!';
    document.getElementById('error').style.display = 'block';
  });
}

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('urlInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') fetchInfo();
  });
});
</script>
</body>
</html>
